name: Gutentag, World!

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: jiro4989/setup-nim-action@v2

      - name: Run
        run: nim compile --run src/gutentag_world.nim

      - name: Verify output
        run: bash test.sh
